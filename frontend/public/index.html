<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#2563eb" />
    <meta
      name="description"
      content="Hospital Attendance System - MERN Stack Application"
    />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/logo192.png" />
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
    <title>Hospital Attendance System</title>
    
    <!-- Debug script for Vercel -->
    <script>
      console.log('HTML loaded successfully');
      console.log('Environment:', {
        NODE_ENV: '%NODE_ENV%',
        REACT_APP_API_URL: '%REACT_APP_API_URL%'
      });
    </script>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root">
      <!-- Fallback content while React loads -->
      <div style="display: flex; justify-content: center; align-items: center; height: 100vh; font-family: Arial, sans-serif;">
        <div style="text-align: center;">
          <h2>Loading Hospital Attendance System...</h2>
          <p>If this message persists, please check the browser console for errors.</p>
        </div>
      </div>
    </div>
    
    <!-- Debug script -->
    <script>
      window.addEventListener('load', function() {
        console.log('Window loaded');
        setTimeout(function() {
          if (document.getElementById('root').innerHTML.includes('Loading Hospital')) {
            console.error('React app failed to load');
            document.getElementById('root').innerHTML = '<div style="padding: 20px; text-align: center;"><h1>App Loading Failed</h1><p>Please check the browser console for errors.</p></div>';
          }
        }, 5000);
      });
    </script>
  </body>
</html>
